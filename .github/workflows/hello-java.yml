name: Hello Java CI

on:
  push:
  pull_request:

jobs:
  build-and-run:
    runs-on: [self-hosted] # change to [self-hosted, windows] or ubuntu-latest as needed
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build with Maven
        run: mvn -B -DskipTests package

      - name: Run HelloWorld
        run: >
          java -cp target/classes com.example.App
